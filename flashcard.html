<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Flashcards</title>
<style>
body {
  font-family: Arial;
  display: flex;
  flex-direction: column;
  align-items: center;
  background: #3cbdc6;
  color: white;
}

.card {
  width: 300px;
  height: 200px;
  perspective: 1000px;
  margin-top: 50px;
}

.inner {
  width: 100%;
  height: 100%;
  text-align: center;
  transition: transform 0.6s;
  transform-style: preserve-3d;
  position: relative;
}

.card.flip .inner {
  transform: rotateY(180deg);
}

.front, .back {
  position: absolute;
  width: 100%;
  height: 100%;
  border-radius: 15px;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 24px;
  backface-visibility: hidden;
  background: white;
  color: black;
}

.back {
  transform: rotateY(180deg);
}

button {
  margin: 20px;
  padding: 10px 20px;
  border: none;
  border-radius: 10px;
  font-size: 16px;
}
</style>
</head>
<body>

<h2>Flashcard App</h2>

<div class="card" onclick="flipCard()">
  <div class="inner" id="card">
    <div class="front" id="front"></div>
    <div class="back" id="back"></div>
  </div>
</div>

<button onclick="nextCard()">Next</button>

let index = 0;

function showCard() {
  document.getElementById("front").innerText = words[index][0];
  document.getElementById("back").innerText = words[index][1];
  document.querySelector(".card").classList.remove("flip");
}

function flipCard() {
  document.querySelector(".card").classList.toggle("flip");
}

function nextCard() {
  index = (index + 1) % words.length;
  showCard();
}
